<!DOCTYPE html>
<html>
<head>
    <title>Agroculture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2e8b57;
            --secondary-color: #f8f9fa;
            --accent-color: #006400;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary-color);
            background-image: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), 
                              url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
        }

        .welcome-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .auth-section {
            margin: 25px 0;
            padding: 20px;
            border-radius: 10px;
            background-color: rgba(248, 249, 250, 0.7);
            transition: all 0.3s ease;
        }

        .auth-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .auth-title {
            font-size: 1.2rem;
            color: var(--accent-color);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .btn-auth {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 500;
            margin: 0 10px;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-auth:hover {
            background-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            color: white;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .divider-text {
            padding: 0 10px;
            color: #6c757d;
            font-size: 0.9rem;
        }

        .icon {
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>Welcome to Agroculture</h1>
        
        <div class="auth-section">
            <div class="auth-title">Farmers</div>
            <a href='/signup/farmer' class="btn btn-auth">
                <i class="fas fa-user-plus icon"></i>Sign Up
            </a>
            <a href='/login/farmer' class="btn btn-auth">
                <i class="fas fa-sign-in-alt icon"></i>Login
            </a>
        </div>

        <div class="divider">
            <span class="divider-text">or</span>
        </div>

        <div class="auth-section">
            <div class="auth-title">Buyers</div>
            <a href='/signup/buyer' class="btn btn-auth">
                <i class="fas fa-user-plus icon"></i>Sign Up
            </a>
            <a href='/login/buyer' class="btn btn-auth">
                <i class="fas fa-sign-in-alt icon"></i>Login
            </a>
        </div>
    </div>

    <!-- Bootstrap JS (optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
